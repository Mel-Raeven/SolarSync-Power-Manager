name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on version tags: v1.0.0, v1.2.3, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/mel-raeven/solarsync

jobs:
  build-and-push:
    name: Build arm64 images and push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU so we can cross-compile to arm64 on the GitHub-hosted x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract the version tag (strips leading 'v') and also set 'latest'
      - name: Extract Docker metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                # e.g. 1.2.3
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Backend image
      # ----------------------------------------------------------------
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: solarsync/backend
          file: solarsync/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ----------------------------------------------------------------
      # Frontend image
      # ----------------------------------------------------------------
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: solarsync/frontend
          file: solarsync/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Summary
        run: |
          echo "### Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_BASE }}-backend:${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_BASE }}-frontend:${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watchtower on your Pi will pick up the \`latest\` tag within the hour." >> "$GITHUB_STEP_SUMMARY"

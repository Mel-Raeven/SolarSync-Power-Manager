name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on version tags: v1.0.0, v1.2.3, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/mel-raeven/solarsync

jobs:
  build-backend:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: solarsync/backend
          file: solarsync/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: solarsync/frontend
          file: solarsync/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Summary
        run: |
          echo "### Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_BASE }}-backend:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_BASE }}-frontend:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watchtower on your Pi will pick up the \`latest\` tag within the hour." >> "$GITHUB_STEP_SUMMARY"

name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on version tags: v1.0.0, v1.2.3, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/mel-raeven/solarsync

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────

  build-backend-amd64:
    name: Build backend (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: solarsync/backend
          file: solarsync/backend/Dockerfile
          platforms: linux/amd64
          push: true
          outputs: type=image,name=${{ env.IMAGE_BASE }}-backend,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=backend-amd64
          cache-to: type=gha,mode=max,scope=backend-amd64

  build-backend-arm64:
    name: Build backend (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: solarsync/backend
          file: solarsync/backend/Dockerfile
          platforms: linux/arm64
          push: true
          outputs: type=image,name=${{ env.IMAGE_BASE }}-backend,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=backend-arm64
          cache-to: type=gha,mode=max,scope=backend-arm64

  merge-backend:
    name: Merge backend manifests
    runs-on: ubuntu-latest
    needs: [build-backend-amd64, build-backend-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Create multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_BASE }}-backend:${{ steps.meta.outputs.version }} \
            --tag ${{ env.IMAGE_BASE }}-backend:latest \
            ${{ env.IMAGE_BASE }}-backend@${{ needs.build-backend-amd64.outputs.digest }} \
            ${{ env.IMAGE_BASE }}-backend@${{ needs.build-backend-arm64.outputs.digest }}

  # ── Frontend ───────────────────────────────────────────────────────────────

  build-frontend-amd64:
    name: Build frontend (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: solarsync/frontend
          file: solarsync/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          outputs: type=image,name=${{ env.IMAGE_BASE }}-frontend,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=frontend-amd64
          cache-to: type=gha,mode=max,scope=frontend-amd64

  build-frontend-arm64:
    name: Build frontend (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: solarsync/frontend
          file: solarsync/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          outputs: type=image,name=${{ env.IMAGE_BASE }}-frontend,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=frontend-arm64
          cache-to: type=gha,mode=max,scope=frontend-arm64

  merge-frontend:
    name: Merge frontend manifests
    runs-on: ubuntu-latest
    needs: [build-frontend-amd64, build-frontend-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Create multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_BASE }}-frontend:${{ steps.meta.outputs.version }} \
            --tag ${{ env.IMAGE_BASE }}-frontend:latest \
            ${{ env.IMAGE_BASE }}-frontend@${{ needs.build-frontend-amd64.outputs.digest }} \
            ${{ env.IMAGE_BASE }}-frontend@${{ needs.build-frontend-arm64.outputs.digest }}

  # ── Summary ────────────────────────────────────────────────────────────────

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [merge-backend, merge-frontend]
    steps:
      - name: Summary
        run: |
          echo "### Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_BASE }}-backend:latest\` (linux/amd64, linux/arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_BASE }}-frontend:latest\` (linux/amd64, linux/arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watchtower on your Pi will pick up the \`latest\` tag within the hour." >> "$GITHUB_STEP_SUMMARY"

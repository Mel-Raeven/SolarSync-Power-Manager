# Mosquitto MQTT broker configuration for SolarSync
# Minimal config — no auth by default for local Docker network
# For production, uncomment the auth lines and set a password file

listener 1883
allow_anonymous true

# Persistence — save messages across restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Uncomment to require authentication:
# allow_anonymous false
# password_file /mosquitto/config/passwd

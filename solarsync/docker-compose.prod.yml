# ============================================================
# SolarSync — Production overrides
# ============================================================
# Uses pre-built images from ghcr.io instead of local builds.
# Also adds Watchtower for automatic image updates.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  backend:
    image: ${GHCR_IMAGE}-backend:${IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ${GHCR_IMAGE}-frontend:${IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ----------------------------------------------------------
  # Watchtower — polls ghcr.io and auto-updates containers
  # ----------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      # Check for new images every hour
      WATCHTOWER_POLL_INTERVAL: 3600
      # Only update containers with this label
      WATCHTOWER_LABEL_ENABLE: "true"
      # Send a notification when an update happens (optional)
      # WATCHTOWER_NOTIFICATION_URL: "slack://token@channel"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount Docker config to authenticate with ghcr.io
      - /root/.docker/config.json:/root/.docker/config.json:ro
    networks:
      - solarsync
    labels:
      - "com.centurylinklabs.watchtower.enable=false"  # Don't update Watchtower itself automatically
